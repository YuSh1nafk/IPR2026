[agents]
dev_role = Chuyên gia Soạn thảo Giáo án Tiếng Anh
dev_goal = Tạo ra một giáo án chuẩn mực dựa trên nội dung SGK, tuân thủ tuyệt đối biểu mẫu (template) quy định.
dev_backstory = Bạn là một giáo viên Tiếng Anh dày dặn kinh nghiệm. Bạn phân tích nội dung bài học rất tốt. Bạn luôn giữ nguyên các thẻ hình ảnh <img src=...> được cung cấp để minh họa cho nội dung bài học.

html_role = Kỹ sư Lập trình Web HTML/CSS
html_goal = Chuyển đổi giáo án văn bản thành một trang HTML trình bày dạng bảng chuyên nghiệp, chuẩn sư phạm.
html_backstory = Bạn là chuyên gia chuyển đổi dữ liệu thô thành giao diện web. Bạn sẽ thiết kế CSS sao cho văn bản dễ nhìn, các bảng (table) có viền đẹp, font chữ chuẩn xác và hình ảnh không bị vỡ khung.

[tasks]
draft_desc = 1. Sử dụng tool (Milvus Content Search) cho môn '{subject}', với truy vấn là '{unit} - {topic}'.
    2. Đọc kỹ nội dung trả về. Chú ý các đề mục nhỏ (Task 1, 2, 3...) và các hình ảnh <img src=...>.
    3. Viết giáo án theo ĐÚNG cấu trúc biểu mẫu bên dưới. Tuyệt đối không xóa các thẻ hình ảnh.

    BIỂU MẪU GIÁO ÁN:
    {template}
draft_expected = Một bản giáo án chi tiết (định dạng Markdown), bám sát 100% biểu mẫu đã yêu cầu.

html_desc = 1. Lấy bản giáo án Markdown vừa được tạo ở bước trước.
    2. Chuyển đổi thành file HTML. Lưu ý: Mọi phần "Organization of implementation" PHẢI được vẽ dưới dạng Table (Bảng) với 2 cột: 'Teacher’s and Ss’ activities' và 'Content'.
    3. Căn chỉnh CSS: Bảng có viền border-collapse: collapse; padding rõ ràng. Font chữ dễ đọc (Arial/Times New Roman). Hình ảnh có max-width: 100%.
    4. Dùng tool "Save HTML to File" để lưu file HTML này vào đường dẫn './outputs/lesson_plan_{unit}_{topic}.html' (nhớ đổi khoảng trắng thành dấu gạch dưới).
html_expected = Chuỗi thông báo xác nhận đường dẫn tới file HTML đã được lưu thành công.

[templates]
lesson_plan = I. OBJECTIVES:
    1. Knowledge: (Tự điền dựa vào nội dung bài)
    2. Core competence: Develop communication skills, be collaborative...
    3. Personal qualities: Develop self-study skills...

    II. MATERIALS:
    - Grade 8 textbook
    - Projector/ TV/ pictures

    III. PROCEDURES:
    1. WARM-UP (5 mins)
    * Aim: To activate students' prior knowledge.
    * Content: (Trò chơi hoặc câu hỏi gợi mở)
    * Organization of implementation:
    [TẠO BẢNG 2 CỘT: Teacher’s and Ss’ activities | Content]

    2. PRESENTATION (5 mins)
    * Aim: To help students understand the new concept.
    * Content: (Giải thích từ vựng/ngữ pháp mới)
    * Products: Students note down the lesson content.
    * Organization of implementation:
    [TẠO BẢNG 2 CỘT: Teacher’s and Ss’ activities | Content]

    3. PRACTICE (8 mins)
    (Với mỗi bài tập nhỏ trong nội dung SGK tìm được, tạo một Task riêng)
    Task 1: (Tên bài tập)
    * Aims: To check students’ understanding.
    * Content: (Yêu cầu bài tập)
    * Products: Students' answers.
    * Organization of implementation:
    [TẠO BẢNG 2 CỘT: Teacher’s and Ss’ activities | Content (Chèn toàn bộ nội dung bài tập, câu hỏi và thẻ <img src=...> minh họa vào cột Content này)]

    Task 2: (Tên bài tập tiếp theo nếu có)...

    4. PRODUCTION (10 mins)
    (Dành cho bài tập thực hành giao tiếp, làm việc nhóm cuối cùng)

    5. WRAP-UP (3 mins)
    * Aim: To summarize the lesson.
    * Organization of implementation:
    [TẠO BẢNG 2 CỘT: Teacher’s and Ss’ activities | Content]

    6. HOMEWORK (1 min)
    * Aim: To revise the lesson.
    * Organization of implementation:
    [TẠO BẢNG 2 CỘT: Teacher’s and Ss’ activities | Content]